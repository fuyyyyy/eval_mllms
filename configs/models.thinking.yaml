models:
  - name: claude_sonnet_4_standard
    provider: anthropic
    source_type: closed_source
    thinking_capable: true
    comparison_group: claude_sonnet_4
    thinking_mode: standard
    model: claude-sonnet-4-0
    api_key_env: ANTHROPIC_API_KEY
    max_tokens: 256

  - name: claude_sonnet_4_thinking
    provider: anthropic
    source_type: closed_source
    thinking_capable: true
    comparison_group: claude_sonnet_4
    thinking_mode: thinking
    model: claude-sonnet-4-0
    api_key_env: ANTHROPIC_API_KEY
    max_tokens: 256
    thinking_budget_tokens: 1024

  - name: gemini_25_flash_no_thinking
    provider: gemini
    source_type: closed_source
    thinking_capable: true
    comparison_group: gemini_25_flash
    thinking_mode: no_thinking
    model: gemini-2.5-flash
    api_key_env: GEMINI_API_KEY
    thinking_budget: 0

  - name: gemini_25_flash_thinking
    provider: gemini
    source_type: closed_source
    thinking_capable: true
    comparison_group: gemini_25_flash
    thinking_mode: thinking
    model: gemini-2.5-flash
    api_key_env: GEMINI_API_KEY
    thinking_budget: 1024

